<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceder - RoomiU ESPE</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body style="min-height:100vh;display:flex;flex-direction:column;">
  <header>
    <div class="logo">RoomiU <span>ESPE</span></div>
    <nav><ul><li><a href="index.html">Volver</a></li><li><a href="registro.html">Crear cuenta</a></li></ul></nav>
  </header>
  <main class="container" style="flex:1;display:flex;align-items:center;justify-content:center;">
    <section class="card form-card" aria-labelledby="login-title">
      <h1 id="login-title" style="text-align:center;">Iniciar sesión</h1>
      <p class="muted" style="text-align:center;margin-bottom:1.25rem;">Acceso por rol para estudiantes, arrendadores y administración.</p>
      <div class="role-tabs" role="tablist" aria-label="Seleccionar rol">
        <button class="btn-primary" data-role-tab="estudiante">Estudiante</button>
        <button class="btn-outline" data-role-tab="arrendador">Arrendador</button>
        <button class="btn-outline" data-role-tab="admin">Admin</button>
      </div>
      <form id="login-form">
        <div class="form-group"><label class="form-label" for="login-email">Correo electrónico</label><input id="login-email" class="form-control" type="email" required></div>
        <div class="form-group"><label class="form-label" for="login-password">Contraseña</label><input id="login-password" class="form-control" type="password" required></div>
        <button class="btn-primary" style="width:100%;">Ingresar</button>
      </form>
      <p style="margin-top:1rem;text-align:center;"><a id="forgot-link" href="#">Olvidé mi contraseña</a></p>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
